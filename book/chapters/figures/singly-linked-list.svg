<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="sll-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
    <marker id="sll-arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="sll-arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="240" fill="#fafafa" rx="8" />

  <!-- ===== head pointer ===== -->
  <text x="50" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563eb">head</text>
  <line x1="80" y1="115" x2="148" y2="115" stroke="#2563eb" stroke-width="2" marker-end="url(#sll-arrow-blue)" />

  <!-- ===== Node 1: value 10 ===== -->
  <g transform="translate(150, 80)">
    <!-- value cell -->
    <rect x="0" y="0" width="60" height="70" fill="#dbeafe" stroke="#1e40af" stroke-width="2" rx="4" />
    <text x="30" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e3a8a">10</text>
    <text x="30" y="-8" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">value</text>
    <!-- next cell -->
    <rect x="60" y="0" width="40" height="70" fill="#fef3c7" stroke="#92400e" stroke-width="2" rx="4" />
    <circle cx="80" cy="35" r="5" fill="#92400e" />
    <text x="80" y="-8" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">next</text>
  </g>

  <!-- arrow from node 1 next to node 2 -->
  <line x1="230" y1="115" x2="298" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#sll-arrow)" />

  <!-- ===== Node 2: value 20 ===== -->
  <g transform="translate(300, 80)">
    <!-- value cell -->
    <rect x="0" y="0" width="60" height="70" fill="#dbeafe" stroke="#1e40af" stroke-width="2" rx="4" />
    <text x="30" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e3a8a">20</text>
    <text x="30" y="-8" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">value</text>
    <!-- next cell -->
    <rect x="60" y="0" width="40" height="70" fill="#fef3c7" stroke="#92400e" stroke-width="2" rx="4" />
    <circle cx="80" cy="35" r="5" fill="#92400e" />
    <text x="80" y="-8" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">next</text>
  </g>

  <!-- arrow from node 2 next to node 3 -->
  <line x1="380" y1="115" x2="448" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#sll-arrow)" />

  <!-- ===== Node 3: value 30 ===== -->
  <g transform="translate(450, 80)">
    <!-- value cell -->
    <rect x="0" y="0" width="60" height="70" fill="#dbeafe" stroke="#1e40af" stroke-width="2" rx="4" />
    <text x="30" y="44" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e3a8a">30</text>
    <text x="30" y="-8" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">value</text>
    <!-- next cell -->
    <rect x="60" y="0" width="40" height="70" fill="#f1f5f9" stroke="#64748b" stroke-width="2" rx="4" />
    <text x="80" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#475569">null</text>
    <text x="80" y="-8" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">next</text>
  </g>

  <!-- ===== tail pointer (points to the entire last node) ===== -->
  <line x1="500" y1="200" x2="500" y2="158" stroke="#16a34a" stroke-width="2" marker-end="url(#sll-arrow-green)" />
  <text x="500" y="220" text-anchor="middle" font-size="15" font-weight="bold" fill="#16a34a">tail</text>

  <!-- ===== Caption ===== -->
  <text x="360" y="40" text-anchor="middle" font-size="13" fill="#475569" font-style="italic">
    Each node stores a value and a pointer to the next node; the last node's next is null.
  </text>
</svg>

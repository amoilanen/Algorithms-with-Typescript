<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 580" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-left" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="580" fill="#fafafa" rx="8" />

  <!-- ==================== LEFT PANEL: The Strip ==================== -->

  <!-- Title -->
  <text x="220" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">The Strip</text>

  <!-- Coordinate area -->
  <g transform="translate(40, 45)">
    <!-- Left half background -->
    <rect x="0" y="0" width="180" height="440" fill="#fef3c7" opacity="0.5" rx="4" />
    <!-- Right half background -->
    <rect x="180" y="0" width="180" height="440" fill="#dbeafe" opacity="0.5" rx="4" />

    <!-- Strip (2δ wide, centered on dividing line) -->
    <rect x="110" y="0" width="140" height="440" fill="#e0e7ff" opacity="0.55" rx="0"
          stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3" />

    <!-- Dividing line -->
    <line x1="180" y1="0" x2="180" y2="440" stroke="#dc2626" stroke-width="2.5" />

    <!-- Label: Left half L -->
    <text x="65" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">L (left)</text>
    <!-- Label: Right half R -->
    <text x="290" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">R (right)</text>

    <!-- Label: dividing line -->
    <text x="180" y="-8" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">median x</text>

    <!-- Strip width annotation: left arrow -->
    <line x1="112" y1="455" x2="178" y2="455" stroke="#2563eb" stroke-width="1.5" marker-start="url(#arrowhead-left)" />
    <text x="145" y="470" text-anchor="middle" font-size="13" fill="#2563eb" font-weight="600">δ</text>
    <!-- Strip width annotation: right arrow -->
    <line x1="182" y1="455" x2="248" y2="455" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead-blue)" />
    <text x="215" y="470" text-anchor="middle" font-size="13" fill="#2563eb" font-weight="600">δ</text>

    <!-- Brace-like label for full strip width -->
    <text x="180" y="490" text-anchor="middle" font-size="14" fill="#4338ca" font-weight="bold">strip width = 2δ</text>

    <!-- ===== Points in Left half (outside strip) ===== -->
    <circle cx="30" cy="80" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />
    <circle cx="55" cy="200" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />
    <circle cx="70" cy="340" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />
    <circle cx="40" cy="390" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />
    <circle cx="80" cy="130" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />

    <!-- ===== Points in Left half (inside strip) ===== -->
    <circle cx="130" cy="110" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />
    <circle cx="150" cy="230" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />
    <circle cx="140" cy="310" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />
    <circle cx="160" cy="380" r="5" fill="#f59e0b" stroke="#92400e" stroke-width="1.5" />

    <!-- ===== Points in Right half (inside strip) ===== -->
    <circle cx="200" cy="90" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />
    <circle cx="220" cy="200" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />
    <circle cx="210" cy="280" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />
    <circle cx="230" cy="360" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />

    <!-- ===== Points in Right half (outside strip) ===== -->
    <circle cx="280" cy="60" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />
    <circle cx="310" cy="170" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />
    <circle cx="330" cy="280" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />
    <circle cx="290" cy="410" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />
    <circle cx="340" cy="400" r="5" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" />

    <!-- Key annotation: point outside strip -->
    <!-- Draw a pair that's too far (horizontal distance > δ) -->
    <line x1="55" y1="200" x2="310" y2="170" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3" />
    <text x="183" y="170" text-anchor="middle" font-size="10" fill="#888">horizontal dist &gt; δ — skip</text>
  </g>


  <!-- ==================== RIGHT PANEL: The Packing Argument ==================== -->

  <!-- Title -->
  <text x="620" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">The Packing Argument (2δ × δ box)</text>

  <g transform="translate(440, 55)">
    <!-- The 2δ × δ rectangle -->
    <rect x="20" y="30" width="320" height="160" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5" rx="3" />

    <!-- Left δ × δ square -->
    <rect x="20" y="30" width="160" height="160" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" />
    <!-- Right δ × δ square -->
    <rect x="180" y="30" width="160" height="160" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" />

    <!-- Dividing line through middle of the box -->
    <line x1="180" y1="25" x2="180" y2="195" stroke="#dc2626" stroke-width="2.5" />
    <text x="180" y="18" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">dividing line</text>

    <!-- Width labels -->
    <line x1="20" y1="210" x2="178" y2="210" stroke="#555" stroke-width="1" marker-start="url(#arrowhead-left)" />
    <line x1="182" y1="210" x2="340" y2="210" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)" />
    <text x="100" y="225" text-anchor="middle" font-size="13" fill="#555" font-weight="600">δ</text>
    <text x="260" y="225" text-anchor="middle" font-size="13" fill="#555" font-weight="600">δ</text>

    <!-- Height label -->
    <line x1="355" y1="32" x2="355" y2="188" stroke="#555" stroke-width="1" marker-end="url(#arrowhead)" />
    <text x="355" y="120" text-anchor="start" font-size="13" fill="#555" font-weight="600" dx="6">δ</text>

    <!-- === Points in the left δ × δ square (at most 4) === -->
    <!-- Point p (the reference point) — highlighted -->
    <circle cx="60" cy="170" r="8" fill="#ef4444" stroke="#991b1b" stroke-width="2" />
    <text x="60" y="174" text-anchor="middle" font-size="10" fill="white" font-weight="bold">p</text>

    <!-- Up to 3 more left-side points (any pair ≥ δ apart) -->
    <circle cx="40" cy="50" r="6" fill="#fca5a5" stroke="#991b1b" stroke-width="1.5" />
    <text x="40" y="54" text-anchor="middle" font-size="9" fill="#7f1d1d" font-weight="bold">1</text>

    <circle cx="155" cy="55" r="6" fill="#fca5a5" stroke="#991b1b" stroke-width="1.5" />
    <text x="155" y="59" text-anchor="middle" font-size="9" fill="#7f1d1d" font-weight="bold">2</text>

    <circle cx="155" cy="170" r="6" fill="#fca5a5" stroke="#991b1b" stroke-width="1.5" />
    <text x="155" y="174" text-anchor="middle" font-size="9" fill="#7f1d1d" font-weight="bold">3</text>

    <!-- === Points in the right δ × δ square (at most 4) === -->
    <circle cx="205" cy="50" r="6" fill="#93c5fd" stroke="#1e40af" stroke-width="1.5" />
    <text x="205" y="54" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">4</text>

    <circle cx="320" cy="55" r="6" fill="#93c5fd" stroke="#1e40af" stroke-width="1.5" />
    <text x="320" y="59" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">5</text>

    <circle cx="205" cy="170" r="6" fill="#93c5fd" stroke="#1e40af" stroke-width="1.5" />
    <text x="205" y="174" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">6</text>

    <circle cx="320" cy="170" r="6" fill="#93c5fd" stroke="#1e40af" stroke-width="1.5" />
    <text x="320" y="174" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="bold">7</text>

    <!-- Label the halves -->
    <text x="100" y="125" text-anchor="middle" font-size="12" fill="#991b1b" opacity="0.6" font-style="italic">Left half</text>
    <text x="260" y="125" text-anchor="middle" font-size="12" fill="#1e40af" opacity="0.6" font-style="italic">Right half</text>

    <!-- Constraint annotations -->
    <!-- Left-side constraint: any two left points ≥ δ apart -->
    <text x="100" y="140" text-anchor="middle" font-size="10" fill="#991b1b" opacity="0.7">since any two are ≥ δ apart</text>
    <!-- Right-side constraint -->
    <text x="260" y="140" text-anchor="middle" font-size="10" fill="#1e40af" opacity="0.7">since any two are ≥ δ apart</text>


    <!-- ===== Explanation text below the box ===== -->
    <text x="180" y="260" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="bold">Why at most 7 neighbors?</text>

    <text x="180" y="282" text-anchor="middle" font-size="11.5" fill="#475569">
      We only look above p (points below were checked in earlier iterations),
    </text>
    <text x="180" y="300" text-anchor="middle" font-size="11.5" fill="#475569">
      so the relevant region is a 2δ × δ box (not 2δ × 2δ).
    </text>
    <text x="180" y="318" text-anchor="middle" font-size="11.5" fill="#475569">
      Each δ × δ half can hold at most 4 points (since any two are ≥ δ apart).
    </text>
    <text x="180" y="342" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="bold">
      Total ≤ 4 + 4 = 8 points in box → at most 7 others besides p.
    </text>

    <!-- Visual equation -->
    <g transform="translate(30, 370)">
      <!-- Left square icon -->
      <rect x="0" y="0" width="30" height="30" fill="#fca5a5" stroke="#991b1b" stroke-width="1.5" rx="2" />
      <text x="15" y="20" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="bold">≤4</text>
      <text x="45" y="20" text-anchor="middle" font-size="16" fill="#555">+</text>
      <!-- Right square icon -->
      <rect x="60" y="0" width="30" height="30" fill="#93c5fd" stroke="#1e40af" stroke-width="1.5" rx="2" />
      <text x="75" y="20" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="bold">≤4</text>
      <text x="105" y="20" text-anchor="middle" font-size="16" fill="#555">=</text>
      <!-- Total -->
      <text x="125" y="20" text-anchor="start" font-size="13" fill="#1e293b" font-weight="bold">≤ 8 points total</text>
      <text x="125" y="38" text-anchor="start" font-size="11" fill="#555">⟹ check at most 7 neighbors per point</text>
      <text x="125" y="54" text-anchor="start" font-size="11" fill="#555">⟹ combine step is O(n)</text>
    </g>
  </g>

  <!-- Bottom note spanning full width -->
  <rect x="20" y="545" width="780" height="28" fill="#f1f5f9" rx="4" />
  <text x="410" y="564" text-anchor="middle" font-size="12" fill="#475569">
    Strip sorted by y — inner loop only scans upward from each point (points below were already paired), so ≤ 7 neighbors to check.
  </text>
</svg>